services:
  - type: web
    name: drinks-system
    runtime: java
    plan: free
    rootDir: .
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/drinks-system-0.0.1-SNAPSHOT.jar
    healthCheckPath: /order
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: supabase
      - key: SUPABASE_PROJECT_URL
        value: https://tmiwahcybsklinnymfpr.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_DB_URL
        value: jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:5432/postgres
      - key: SUPABASE_DB_USER
        value: postgres.tmiwahcybsklinnymfpr
      - key: SUPABASE_DB_PASSWORD
        sync: false
