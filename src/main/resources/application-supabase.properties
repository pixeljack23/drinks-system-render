spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

supabase.project-url=${SUPABASE_PROJECT_URL:}
supabase.anon-key=${SUPABASE_ANON_KEY:}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.datasource.hikari.maximum-pool-size=${SUPABASE_DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SUPABASE_DB_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${SUPABASE_DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.data-source-properties.sslmode=require

spring.h2.console.enabled=false
app.seed.enabled=true
