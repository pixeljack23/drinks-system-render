<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{sidebar :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{sidebar :: navbar}"></div>

<main class="container py-5">
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <div class="card surface-card">
        <div class="card-body p-4">
            <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
                <div>
                    <h1 class="h4 mb-1">Stock levels</h1>
                    <p class="text-secondary mb-0">Check drink availability and add new stock for each branch.</p>
                </div>
                <form class="d-flex gap-2" method="get" th:action="@{/admin/stock}">
                    <select class="form-select" name="branchId">
                        <option th:each="branch : ${branches}" th:selected="${branch.id == selectedBranchId}" th:text="${branch.name}" th:value="${branch.id}">CBD Branch</option>
                    </select>
                    <button class="btn btn-dark" type="submit">View</button>
                </form>
            </div>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Drink</th>
                        <th>Category</th>
                        <th>Quantity</th>
                        <th>Restock</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="stock : ${stockLevels}">
                        <td th:text="${stock.drink.name}">Cola</td>
                        <td th:text="${stock.drink.category}">Soda</td>
                        <td th:text="${stock.quantity}">45</td>
                        <td>
                            <form class="d-flex gap-2 align-items-center"
                                  method="post"
                                  th:action="@{/admin/stock/restock}">
                                <input name="branchId" th:value="${selectedBranchId}" type="hidden">
                                <input name="drinkId" th:value="${stock.drink.id}" type="hidden">
                                <input class="form-control" min="1" name="quantity" style="max-width: 120px;" type="number" value="10">
                                <button class="btn btn-dark btn-sm" type="submit">Add Stock</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(stockLevels)}">
                        <td class="text-secondary" colspan="4">No stock records found for this branch.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{sidebar :: scripts}"></div>
</body>
</html>
