<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{sidebar :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{sidebar :: navbar}"></div>

<main class="container py-5">
    <div class="card hero-card">
        <div class="card-body p-4 p-lg-5">
            <span class="badge text-bg-success mb-3">Confirmed</span>
            <h1 class="display-6 fw-bold">Order received</h1>
            <p class="lead text-secondary mb-4">
                Order for <span class="fw-semibold" th:text="${order.customerName}">Walk-in Customer</span>
                at <span class="fw-semibold" th:text="${order.branch.name}">CBD Branch</span>.
            </p>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Drink</th>
                        <th>Qty</th>
                        <th>Unit Price</th>
                        <th>Line Total</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${order.items}">
                        <td th:text="${item.drink.name}">Cola</td>
                        <td th:text="${item.quantity}">1</td>
                        <td th:text="'$' + ${item.unitPrice}">$2.50</td>
                        <td th:text="'$' + ${item.lineTotal}">$2.50</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="d-flex justify-content-between align-items-center border-top pt-3">
                <div>
                    <div class="text-secondary small">Status</div>
                    <div class="fw-semibold" th:text="${order.status}">CONFIRMED</div>
                </div>
                <div class="text-end">
                    <div class="text-secondary small">Total</div>
                    <div class="fs-4 fw-bold" th:text="'$' + ${order.totalAmount}">$7.50</div>
                </div>
            </div>

            <div class="mt-4">
                <a class="btn btn-dark" th:href="@{/}">Place Another Order</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
