<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<style>
    .branch-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1.25rem;
    }
    .branch-card {
        display: block;
        border-radius: 1.4rem;
        padding: 1.5rem;
        text-decoration: none;
        color: inherit;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(30, 58, 138, 0.10);
        box-shadow: 0 18px 48px rgba(17, 24, 39, 0.08);
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .branch-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 24px 56px rgba(17, 24, 39, 0.12);
        border-color: rgba(20, 184, 166, 0.36);
    }
    .branch-card.hq {
        background: linear-gradient(135deg, rgba(30, 58, 138, 0.96), rgba(20, 184, 166, 0.86));
        color: #fff;
    }
    .branch-meta {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: start;
    }
    .branch-badge {
        border-radius: 999px;
        padding: 0.35rem 0.7rem;
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(249, 115, 22, 0.12);
        color: var(--brand-accent);
    }
    .branch-card.hq .branch-badge {
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
    }
    @media (max-width: 991.98px) {
        .branch-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<main class="container py-5 page-shell">
    <section class="hero-card p-4 p-lg-5 mb-4">
        <div class="row align-items-center g-4">
            <div class="col-lg-7">
                <div class="section-label text-uppercase fw-bold">Screen 1</div>
                <h1 class="display-6 fw-bold mb-3">Choose a branch and start the order.</h1>
                <p class="text-secondary mb-0">The menu and stock shown on the next screen come directly from the current branch inventory.</p>
            </div>
            <div class="col-lg-5">
                <div class="surface-card p-4 h-100">
                    <div class="section-label text-uppercase fw-bold">Available Branches</div>
                    <div class="display-6 fw-bold" th:text="${#lists.size(branches)}">4</div>
                    <div class="text-secondary">Customer ordering is enabled for the seeded branch network.</div>
                </div>
            </div>
        </div>
    </section>

    <section class="branch-grid">
        <a class="branch-card"
           th:classappend="${branch.name == 'Headquarters'} ? ' hq' : ''"
           th:each="branch : ${branches}"
           th:href="@{/order/{branchId}(branchId=${branch.id})}">
            <div class="branch-meta mb-4">
                <div>
                    <div class="section-label text-uppercase fw-bold mb-2"
                         th:text="${branch.name == 'Headquarters'} ? 'Head Office' : 'Branch Outlet'">Branch Outlet</div>
                    <h2 class="h3 mb-2" th:text="${branch.name == 'Headquarters' ? 'Nairobi HQ' : branch.name}">Nairobi HQ</h2>
                    <p class="mb-0 opacity-75" th:text="${branch.location}">Nairobi CBD</p>
                </div>
                <span class="branch-badge" th:text="${branch.name == 'Headquarters'} ? 'HQ' : 'Open'">HQ</span>
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <span class="fw-semibold">Browse drinks</span>
                <span aria-hidden="true">&rarr;</span>
            </div>
        </a>
    </section>
</main>

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
