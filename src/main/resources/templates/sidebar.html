<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | DrinksCo'">DrinksCo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #fff;
            min-height: 100vh;
            margin-left: 250px;
        }
        .navbar-brand {
            letter-spacing: 0.08em;
            font-weight: 700;
        }
        .hero-card, .surface-card {
            border: 0;
            border-radius: 1.25rem;
            box-shadow: 0 1rem 2.5rem rgba(31, 41, 55, 0.08);
        }
        .sidebar {
            width: 250px;
            background: #2c3e50;
            min-height: 100vh;
            padding: 20px 0;
            position: fixed;
            left: 0;
            top: 0;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.1);
        }
        .sidebar .nav {
            padding: 20px;
        }
        .sidebar .navbar-brand {
            color: white !important;
            display: block;
            padding: 15px 20px;
            font-size: 1.3rem;
            margin-bottom: 20px;
        }
        .sidebar .nav-link {
            color: white !important;
            padding: 12px 15px;
            margin: 2px 0;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .sidebar .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.2);
            padding-left: 25px;
            border-left: 2px solid white;
        }
            .sidebar .nav-link.active {
                background-color: rgba(255, 255, 255, 0.3);
                padding-left: 25px;
                border-left: 2px solid white;
            }
        .card-orders {
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%) !important;
            border: none;
            color: white;
        }
        .card-orders .text-secondary {
            color: rgba(255, 255, 255, 0.7) !important;
        }
        .card-orders .bi {
            color: rgba(255, 255, 255, 0.8) !important;
        }
        .card-revenue {
            background: linear-gradient(135deg, #16a085 0%, #1abc9c 100%) !important;
            border: none;
            color: white;
        }
        .card-revenue .text-secondary {
            color: rgba(255, 255, 255, 0.7) !important;
        }
        .card-revenue .bi {
            color: rgba(255, 255, 255, 0.8) !important;
        }
        .card-metric {
            background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%) !important;
            border: none;
            color: white;
        }
        .card-metric .text-secondary {
            color: rgba(255, 255, 255, 0.7) !important;
        }
        .card-metric .bi {
            color: rgba(255, 255, 255, 0.8) !important;
        }
    </style>
</head>
<body>
<div class="sidebar" th:fragment="navbar">
<nav class="nav flex-column">
         <div class="text-center">
      <a class="navbar-brand" href="#">
      <img th:src="@{/images/logo.png}" alt="Logo" width="100" height="100" class="d-inline-block align-text-top" style="border-radius: 50%;">
    </a>
         </div>
            <a class="nav-link" href="/admin" data-href="/admin">Dashboard</a>
            <a class="nav-link" href="/admin/orders" data-href="/admin/orders">Orders</a>
            <a class="nav-link" href="/admin/stock" data-href="/admin/stock">Stock</a>
            <a class="nav-link" href="/admin/reports" data-href="/admin/reports">Reports</a>
</nav>
</div>
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.sidebar .nav-link');
            
            navLinks.forEach(link => {
                const href = link.getAttribute('data-href');
                if (href === '/' && currentPath === '/') {
                    link.classList.add('active');
                } else if (href !== '/' && currentPath.startsWith(href)) {
                    link.classList.add('active');
                }
            });
        });
    </script>
</div>
</body>
</html>
